<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>F1RE</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #111;
        color: #eee;
        font-family: system-ui, sans-serif;
        overflow: hidden;
        height: 100%;
      }
      #game {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #rotate-prompt {
        position: fixed;
        inset: 0;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        padding: 24px;
        text-align: center;
        background: #111;
        z-index: 10;
      }
      #rotate-prompt .title {
        font-size: 56px;
        font-weight: bold;
        color: #e10600;
        letter-spacing: 4px;
      }
      #rotate-prompt .msg {
        font-size: 18px;
        color: #cccccc;
        max-width: 360px;
        line-height: 1.4;
      }
      @media (pointer: coarse) and (orientation: portrait),
             (pointer: coarse) and (max-width: 699px),
             (pointer: coarse) and (max-height: 359px) {
        #rotate-prompt { display: flex; }
        #game { display: none !important; }
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="rotate-prompt">
      <div class="title">F1RE</div>
      <div class="msg">Please rotate your device to landscape.<br/>Minimum screen size: 700 &times; 360.</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
